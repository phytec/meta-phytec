#@TYPE: Machine
#@NAME: stm32mp25x-phyflex-libra-rdk-4-m33td
#@DESCRIPTION: phyFLEX-STM32MP25x Libra Rapid Development Kit (4Gib RAM/USB3 SS) - M33 Trusted Domain
#@BOOTSCHEME: M33 Trusted Domain boot from SD-Card or eMMC
#@ARTICLENUMBERS: PFL-G-04-SP002

# Define common PHYTEC board familly
MACHINEOVERRIDES =. "phyflex-fpsc-g:phyflex-libra-rdk:stm32mp2-phyflex-libra-rdk:"
# Define common SoC familly
MACHINEOVERRIDES =. "stm32mp2common:stm32mp25common:"
# Define common M33 Trusted Domain
MACHINEOVERRIDES =. "stm32mp2m33tdcommon:stm32mp2m33td:"

include conf/machine/include/phystm32mp.inc

# =========================================================================
# Chip architecture
# =========================================================================
DEFAULTTUNE = "cortexa35"
include conf/machine/include/arm/armv8a/tune-cortexa35.inc

# =========================================================================
# boot scheme
# =========================================================================
BOOTSCHEME_LABELS = "optee"

# =========================================================================
# Machine settings
# =========================================================================
# Kernel Device Tree
KERNEL_DEVICETREE = "st/stm32mp257f-phyflex-libra-rdk-m33td.dtb"

# Bootloaders Device Tree (for MCUboot, TF-M, TF-A, OP-TEE and U-boot)
BOOTLOADER_DT = "stm32mp257f-phyflex-fpsc-g-som-4Gb-m33td"

# =========================================================================
# Machine features
# =========================================================================
# Yocto standard machine features
MACHINE_FEATURES += "bluetooth"
MACHINE_FEATURES += "wifi"

# PHYTEC expansion board machine feature (Hardware add-ons)
MACHINE_FEATURES += "phy-expansions"

# OpenSTLinux machine features
MACHINE_FEATURES:append:openstlinuxcommon = " splashscreen"
MACHINE_FEATURES:append:openstlinuxcommon = " watchdog"
# Cortex M33
MACHINE_FEATURES:append:openstlinuxcommon = " m33copro"
MACHINE_FEATURES:append = " m33td"
# Cortex M0
MACHINE_FEATURES:append:openstlinuxcommon = " m0copro"
#GPU
MACHINE_FEATURES:append:openstlinuxcommon = " ${@'gpu' if d.getVar('ACCEPT_EULA_'+d.getVar('MACHINE')) == '1' else ''}"
MACHINE_FEATURES:append:openstlinuxcommon = " ${@'openvx' if d.getVar('ACCEPT_EULA_'+d.getVar('MACHINE')) == '1' else ''}"
MACHINE_FEATURES:append:openstlinuxcommon = " ${@'opencl' if d.getVar('ACCEPT_EULA_'+d.getVar('MACHINE')) == '1' else ''}"
MACHINE_FEATURES:append:openstlinuxcommon = " ${@'vulkan' if d.getVar('ACCEPT_EULA_'+d.getVar('MACHINE')) == '1' else ''}"

# =========================================================================
# Kernel
# =========================================================================

# Define the devicetree overlays enabled by default (when 'phy-expansions' machine feature enabled)
DEFAULT_PHY_EXPANSIONS = "stm32mp2-phyflex-libra-rdk-lvds-ph128800t006-zhc01"
DEFAULT_PHY_EXPANSIONS += "stm32mp25-phyflex-libra-rdk-usb3ss"

# =========================================================================
# flashlayout
# =========================================================================
# Define the config labels to use to generate flashlayout file
BOOTDEVICE_LABELS += "emmc"
BOOTDEVICE_LABELS += "sdcard"

# =========================================================================
# Specific extra configuration for M33-TD
# =========================================================================
# BOOTLOADER_EXTERNAL_DT must be set to use DT suffix
BOOTLOADER_EXTERNAL_DT = "${BOOTLOADER_DT}"
# Configure external DT suffix to handle different DT files depending on boot device
EXTDT_USE_SUFFIX = "1"
EXTDT_SUFFIX_EMMC   = "-emmc"
EXTDT_SUFFIX_SDCARD = "-sdcard"

# TF-M platform
TFM_STM_PLATFORM=" stm/stm32mp257f_phyflex_fpsc_g_som"

# Default M33-TD firmware to use
M33TD_FIRMWARE_CONFIG = "stm32mp25x-phyflex-libra-rdk"
M33TD_FIRMWARE_PROJECT[stm32mp25x-phyflex-libra-rdk] = "Projects/STM32MP257F-PHYFLEX/Demonstrations/StarterApp_M33TD"

# For programming, use standard A35-TD TF-A and FIP device tree (U-boot + OP-TEE)
STM32MP_DT_FILES_PROGRAMMER = "stm32mp257f-phyflex-fpsc-g-som-4Gb-m33td-serial-a35td"
STM32MP_DEVICETREE_PROGRAMMER_SUFFIX = "-serial-a35td"
