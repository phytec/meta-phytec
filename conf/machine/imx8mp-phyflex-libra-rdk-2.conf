#@TYPE: Machine
#@NAME: imx8mp-phyflex-libra-rdk-2
#@DESCRIPTION: PHYTEC Libra phyFLEX-i.MX 8M Plus FPSC, 2GB RAM, PD-05023 FPSC Gamma PL1618.2
#@ARTICLENUMBERS: KPD-05023-ALPHA.A0

MACHINEOVERRIDES =. "mx8mp:phyflex-fpsc-g:phyflex-libra-rdk:imx8mp-phyflex-libra-rdk:"

require conf/machine/include/imx-base.inc
include conf/machine/include/phyimx8m.inc

MACHINE_FEATURES += "alsa can gpu screen"

KERNEL_DEVICETREE = " \
        freescale/imx8mp-phyflex-libra-rdk.dtb \
        freescale/imx8mp-phyflex-libra-rdk-lvds-etml1010g3dra.dtbo \
        freescale/imx8mp-phyflex-libra-rdk-lvds-peb-av-10.dtbo \
        freescale/imx8mp-phyflex-libra-rdk-lvds-ph128800t006-zhc01.dtbo \
        freescale/imx8mp-phyflex-libra-rdk-vm016-csi1.dtbo \
        freescale/imx8mp-phyflex-libra-rdk-vm016-csi1-fpdlink-port0.dtbo \
        freescale/imx8mp-phyflex-libra-rdk-vm016-csi1-fpdlink-port1.dtbo \
        freescale/imx8mp-phyflex-libra-rdk-vm016-csi2.dtbo \
        freescale/imx8mp-phyflex-libra-rdk-vm016-csi2-fpdlink-port0.dtbo \
        freescale/imx8mp-phyflex-libra-rdk-vm016-csi2-fpdlink-port1.dtbo \
        freescale/imx8mp-phyflex-libra-rdk-vm017-csi1.dtbo \
        freescale/imx8mp-phyflex-libra-rdk-vm017-csi1-fpdlink-port0.dtbo \
        freescale/imx8mp-phyflex-libra-rdk-vm017-csi1-fpdlink-port1.dtbo \
        freescale/imx8mp-phyflex-libra-rdk-vm017-csi2.dtbo \
        freescale/imx8mp-phyflex-libra-rdk-vm017-csi2-fpdlink-port0.dtbo \
        freescale/imx8mp-phyflex-libra-rdk-vm017-csi2-fpdlink-port1.dtbo \
        freescale/imx8mp-phyflex-libra-rdk-vm020-csi1.dtbo \
        freescale/imx8mp-phyflex-libra-rdk-vm020-csi1-fpdlink-port0.dtbo \
        freescale/imx8mp-phyflex-libra-rdk-vm020-csi1-fpdlink-port1.dtbo \
        freescale/imx8mp-phyflex-libra-rdk-vm020-csi2.dtbo \
        freescale/imx8mp-phyflex-libra-rdk-vm020-csi2-fpdlink-port0.dtbo \
        freescale/imx8mp-phyflex-libra-rdk-vm020-csi2-fpdlink-port1.dtbo \
"

# Set DDR FIRMWARE
DDR_FIRMWARE_NAME = " \
	lpddr4_pmu_train_1d_dmem_202006.bin \
	lpddr4_pmu_train_1d_imem_202006.bin \
	lpddr4_pmu_train_2d_dmem_202006.bin \
	lpddr4_pmu_train_2d_imem_202006.bin \
"

UBOOT_CONFIG = "sd"
UBOOT_CONFIG[sd] = "imx8mp-phyflex-libra-rdk_defconfig,sdcard"
SPL_BINARY = "spl/u-boot-spl.bin"

# Set u-boot DTB
UBOOT_DTB_NAME = "imx8mp-phyflex-libra-rdk.dtb"
# fdt_addr_r
UBOOT_DTB_LOADADDRESS = "0x40480000"
# fdtoverlay_addr_r
UBOOT_DTBO_LOADADDRESS = "0x404a0000"
# kernel_addr_r
UBOOT_ENTRYPOINT:mx8m-generic-bsp = "${UBOOT_LOADADDRESS}"
UBOOT_LOADADDRESS = "0x40a00000"

ATF_PLATFORM = "imx8mp"
ATF_LOAD_ADDR = "0x970000"

# Set imx-mkimage boot target
IMXBOOT_TARGETS = "flash_evk"

# Set Serial console
SERIAL_CONSOLES = "115200;ttymxc3"

IMAGE_BOOTLOADER = "imx-boot"

KERNEL_IMAGETYPE = "Image"

UBOOT_SUFFIX = "bin"
UBOOT_MAKE_TARGET = "all"
